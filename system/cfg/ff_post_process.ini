; ==============================================================================
; Assetto Corsa Force Feedback Post-Processing Configuration
; ==============================================================================
; T300RS GT Optimization Profile
; Designed for CSP 0.3.0-preview342+
; 
; This file implements Gamma-mode force feedback tuning for the Thrustmaster
; T300RS GT wheel, optimized for stock hardware (900° rotation, belt drive).
;
; Base AC Settings (required for optimal results):
;   Gain = 65
;   Filter = 0
;   Minimum Force = 0
;   Kerb Effects = 2
;   Road Effects = 0
;   Slip Effects = 0
;   ABS Effects = 0
;   Enhanced Understeer = OFF
;   Soft Lock = ON
; ==============================================================================

[FF_POST_PROCESS]

; ==============================================================================
; GAMMA CORRECTION
; ==============================================================================
; Gamma mode implements a power-law curve: output = input^(1/gamma)
; This preserves linear force response without artificial center boost.
;
; Gamma = 1.00   → Linear response (neutral, no compression/expansion)
; Gamma < 1.00   → Compressed (subtle forces feel stronger)
; Gamma > 1.00   → Expanded (forces feel more gradual)
;
; T300RS GT is belt-driven (lacks gear self-centering), so we use neutral
; gamma to maintain linearity. CSP gyro compensation handles centering.
; ==============================================================================
gamma = 1.00

; ==============================================================================
; FILTER STRENGTH
; ==============================================================================
; Applies low-pass filtering to smooth force feedback.
;   0 = No filtering (raw FFB data, very responsive)
;   1 = Light filtering (small oscillations removed)
;   2 = Medium filtering (smooth but may lose detail)
;   3 = Heavy filtering (very smooth, delayed response)
;
; T300RS GT handles raw FFB well. Use 0 for maximum detail on bumpy surfaces.
; If FFB feels noisy/jittery, increase to 1 or 2.
; ==============================================================================
filter = 0

; ==============================================================================
; MINIMUM FORCE THRESHOLD
; ==============================================================================
; Minimum force amplitude (0-1) before FFB is applied.
; Forces below this threshold are ignored (deadband).
;   0.0 = No deadband, all forces applied
;   0.1 = 10% deadband, subtle forces removed
;   0.2 = 20% deadband, only strong forces registered
;
; T300RS GT is sensitive enough to register small forces clearly.
; Use 0.0 for maximum feedback detail (no deadband).
; ==============================================================================
minimum_force = 0.0

; ==============================================================================
; FORCE FEEDBACK DIRECTION
; ==============================================================================
; Inverts FFB polarity if needed (hardware-specific).
;   0 = Normal (left steering → left force)
;   1 = Inverted (left steering → right force)
;
; T300RS GT uses standard FFB polarity. Use 0 (normal).
; If FFB feels backwards after installation, change to 1.
; ==============================================================================
invert = 0

; ==============================================================================
; DAMPING COMPENSATION
; ==============================================================================
; Compensates for mechanical damping in the wheel (removes sluggishness).
; Range: 0.0 (none) to 2.0 (aggressive)
;   0.5 = Mild compensation (minimal intervention)
;   1.0 = Standard compensation (default)
;   1.5 = Aggressive compensation (very responsive)
;
; T300RS GT has minimal internal damping. Use 1.0 for balanced feel.
; If wheel feels sluggish despite CSP damper settings, increase to 1.2-1.3.
; ==============================================================================
damping_compensation = 1.0

; ==============================================================================
; CENTER SPRING COMPENSATION
; ==============================================================================
; Compensates for or enhances center spring effect.
; Range: 0.0 (removes all centering) to 2.0 (strong centering)
;   0.0 = No compensation (wheel free-floating)
;   0.5 = Reduced spring (softer centering)
;   1.0 = Natural spring (normal centering)
;   1.5 = Enhanced spring (stronger centering)
;
; T300RS GT is belt-driven and lacks natural self-centering.
; Use 1.0 and let CSP Gyro=ON handle centering compensation.
; This preserves linearity better than artificial center spring.
; ==============================================================================
center_spring_compensation = 1.0

; ==============================================================================
; RESPONSE CURVE PRESETS
; ==============================================================================
; Alternative response curve shapes. Overrides gamma if set to non-zero.
;   0 = Gamma mode (use gamma value above) [RECOMMENDED]
;   1 = Linear (1:1 input-to-output)
;   2 = Progressive (forces increase faster at high amplitudes)
;   3 = Logarithmic (forces increase slower at high amplitudes)
;
; Gamma mode (0) is recommended because it preserves the linearity needed
; for belt-driven wheels like the T300RS GT.
; ==============================================================================
response_curve = 0

; ==============================================================================
; OSCILLATION DAMPING
; ==============================================================================
; Reduces high-frequency oscillations (wheel ringing after impacts).
; Range: 0.0 (none) to 1.0 (maximum damping)
;   0.0 = No damping (raw oscillations preserved)
;   0.3 = Light damping (minor oscillations removed)
;   0.6 = Medium damping (clear oscillations smoothed)
;   1.0 = Heavy damping (very smooth, may lose detail)
;
; Use 0.2-0.3 for T300RS GT to remove kerb ringing while preserving detail.
; ==============================================================================
oscillation_damping = 0.2

; ==============================================================================
; FORCE SCALING BY SPEED
; ==============================================================================
; Adjusts FFB intensity based on car velocity.
; This simulates realistic tire behavior (tires are more sensitive at speed).
;
; speed_fuzz_boundary = Speed threshold (km/h) below which forces scale down
; speed_fuzz_scale = Scaling factor below threshold
;   1.0 = Full FFB even at low speeds
;   0.5 = 50% FFB at low speeds, ramping to 100% at threshold
;   0.0 = No FFB below threshold
;
; T300RS GT benefits from consistent FFB across speed ranges.
; Use speed_fuzz_boundary = 20 km/h, speed_fuzz_scale = 0.7 for natural ramp.
; ==============================================================================
speed_fuzz_boundary = 20
speed_fuzz_scale = 0.7

; ==============================================================================
; FORCE CLIPPING PROTECTION
; ==============================================================================
; Prevents wheel from saturating when forces exceed maximum output.
; Range: 0.0 (hard clipping) to 1.0 (soft clipping)
;   0.0 = Hard clipping (forces cut off abruptly at max)
;   0.5 = Medium clipping (gradual compression near max)
;   1.0 = Soft clipping (smooth compression throughout range)
;
; Use 0.8 for T300RS GT to prevent jarring cutoff during extreme events.
; ==============================================================================
force_clipping_mode = 0.8

; ==============================================================================
; CENTER DEADZONE
; ==============================================================================
; Dead zone around steering center (0-1, where 1 is half steering range).
; Forces below this threshold are ignored near center.
;   0.00 = No deadzone (all center forces applied)
;   0.05 = Small deadzone (5% of range, subtle forces near center ignored)
;   0.10 = Medium deadzone (10% of range)
;
; T300RS GT is precise enough to detect small forces.
; Use 0.00 for maximum feedback detail at center.
; ==============================================================================
center_deadzone = 0.00

; ==============================================================================
; NOTES & CALIBRATION
; ==============================================================================
; 
; IF FFB FEELS WEAK:
;   1. Check AC Gain = 65 (default)
;   2. Verify filter = 0
;   3. Increase CSP Gyro Gain to 120-130 in CSP settings
;   4. Try speed_fuzz_scale = 0.5 for more low-speed feedback
;
; IF FFB FEELS NOISY/JITTERY:
;   1. Increase filter to 1 (light smoothing)
;   2. Increase oscillation_damping to 0.4-0.5
;   3. Reduce CSP Damper Gain to 5-7
;   4. Lower speed_fuzz_scale to 0.3
;
; IF CENTER FEELS LOOSE:
;   1. Enable CSP Gyro = ON (Gyro Gain = 100)
;   2. Increase center_spring_compensation to 1.2-1.3
;   3. Verify AC "Soft Lock" = ON
;
; IF FFB FEELS DELAYED:
;   1. Reduce filter (should be 0)
;   2. Reduce oscillation_damping to 0.0-0.1
;   3. Reduce CSP Damper Gain to 5
;
; IMPORTANT:
;   - This profile assumes AC Gain = 65 baseline
;   - CSP Gyro compensation MUST be enabled for T300RS GT
;   - Inertia Gain helps significantly (set to 15)
;   - Test on familiar track before racing
;
; ==============================================================================
