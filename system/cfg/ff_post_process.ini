; ==============================================================================
; Assetto Corsa Force Feedback Post-Processing Configuration
; ==============================================================================
; T300RS GT Optimization Profile (PRODUCTION TUNED)
; Designed for CSP 0.3.0-preview342+
; 
; T300RS GT Characteristics:
;   - Belt-driven motor (not gear-driven)
;   - 900° rotation lock (hard limit)
;   - High force output capability (>25 Nm peak)
;   - Excellent detail/clarity
;   - Linear force response across range
;   - Natural damping characteristics
;
; CRITICAL: This profile requires EXACT AC FFB settings to work:
;   Gain = 80 (INCREASED from 65 for belt-drive clarity)
;   Filter = 0 (no smoothing, raw detail)
;   Minimum Force = 0
;   Kerb Effects = 3 (IMPORTANT: belt drives need high kerb)
;   Road Effects = 1 (IMPORTANT: tire detail)
;   Slip Effects = 1 (IMPORTANT: slide feedback)
;   ABS Effects = 1 (IMPORTANT: ABS chatter)
;   Enhanced Understeer = OFF
;   Soft Lock = ON (mandatory for 900° wheels)
; ==============================================================================

[FF_POST_PROCESS]

; ==============================================================================
; GAMMA CORRECTION - CRITICAL FOR T300RS GT
; ==============================================================================
; T300RS GT belt-drive wheels need AGGRESSIVE gamma for realistic feel.
; The belt transmission naturally compresses high-frequency feedback.
; Gamma correction EXPANDS this compressed range for maximum detail.
;
; Gamma = 0.65  → Aggressive expansion (forces feel sharper)
; Gamma = 0.75  → Medium expansion (balanced)
; Gamma = 1.00  → Linear (too compressed for belt drives)
; Gamma = 1.25+ → Compression (wrong direction)
;
; Use 0.70 for T300RS GT to restore detail lost to belt damping.
; This makes subtle tire forces, kerbs, and road texture CLEAR AND PRESENT.
; ==============================================================================
gamma = 0.70

; ==============================================================================
; FILTER - MUST BE 0 FOR REALISM
; ==============================================================================
; CSP OVERRIDES any filter here if configured in CSP menu.
; Keep at 0. Do NOT increase.
; T300RS GT can handle raw FFB without ringing.
;   0 = Raw FFB (correct for this wheel)
;   1+ = Don't use (muddies feedback)
; ==============================================================================
filter = 0

; ==============================================================================
; MINIMUM FORCE THRESHOLD - Keep at 0
; ==============================================================================
; T300RS GT is precise. No deadband needed.
; Set to 0.0 to feel all forces including subtle tire feedback.
; ==============================================================================
minimum_force = 0.0

; ==============================================================================
; FORCE DIRECTION
; ==============================================================================
; T300RS GT: Use 0 (standard polarity)
;   0 = Normal (correct for T300RS GT)
;   1 = Inverted (only if forces feel backwards)
; ==============================================================================
invert = 0

; ==============================================================================
; DAMPING COMPENSATION
; ==============================================================================
; T300RS GT has belt transmission damping that naturally reduces feedback.
; Increase this to RESTORE the lost forces.
;
; Range: 0.5 to 2.0
;   1.0 = Standard (some compression remains)
;   1.3 = Aggressive (restores most detail)
;   1.6 = Maximum (compensates for belt lag)
;
; Recommended: 1.4 (belt-drive restoration)
; This is what makes the difference between mushy and crisp feedback.
; ==============================================================================
damping_compensation = 1.4

; ==============================================================================
; CENTER SPRING COMPENSATION
; ==============================================================================
; T300RS GT is belt-driven and lacks natural self-centering.
; This parameter adds artificial centering FORCE.
;
; Range: 0.0 to 2.0
;   0.5 = Weak centering (loose feel)
;   1.0 = Natural (default, barely noticeable)
;   1.2 = Moderate (helps with off-center feel)
;   1.5 = Strong (noticeable artificial boost)
;
; Recommended: 1.0 (let CSP Gyro=ON handle centering instead)
; CSP Gyro is more realistic than artificial spring.
; ==============================================================================
center_spring_compensation = 1.0

; ==============================================================================
; RESPONSE CURVE - Use Gamma Mode Only
; ==============================================================================
;   0 = Gamma mode (use gamma value above) [REQUIRED for T300RS GT]
;   1 = Linear (don't use, too compressed)
;   2 = Progressive (don't use)
;   3 = Logarithmic (don't use)
;
; T300RS GT MUST use gamma mode (0). This is non-negotiable.
; ==============================================================================
response_curve = 0

; ==============================================================================
; OSCILLATION DAMPING - Critical for belt wheels
; ==============================================================================
; Belt-driven wheels can oscillate at certain frequencies.
; This parameter removes high-frequency ringing from kerbs/bumps.
;
; Range: 0.0 to 1.0
;   0.0 = No damping (raw ringing, annoying)
;   0.15 = Light damping (minimal filtering)
;   0.3 = Medium damping (good detail preservation)
;   0.5+ = Heavy damping (may lose tire detail)
;
; Recommended: 0.25 (removes kerb ringing, preserves subtlety)
; ==============================================================================
oscillation_damping = 0.25

; ==============================================================================
; FORCE SCALING BY SPEED - Belt drives need this
; ==============================================================================
; Belt motors generate less feedback at low speeds.
; This compensates by scaling up forces below threshold.
;
; speed_fuzz_boundary: Speed (km/h) below which scaling applies
; speed_fuzz_scale: Multiplier at low speeds (1.0 = no scaling)
;
; Recommended: boundary=30, scale=1.2
; This means: at 0-30 km/h, increase FFB by 20%. Ramp to normal at 30+ km/h.
; Result: low-speed steering feels alive, not mushy.
; ==============================================================================
speed_fuzz_boundary = 30
speed_fuzz_scale = 1.2

; ==============================================================================
; FORCE CLIPPING - Soft clipping for smooth saturation
; ==============================================================================
; When forces exceed wheel maximum output, how do we handle it?
;   0.0 = Hard clipping (forces cut abruptly, jarring)
;   0.5 = Medium (gradual compression)
;   1.0 = Soft (smooth compression throughout)
;
; Recommended: 0.9 (very smooth, prevents jarring at limit)
; T300RS GT can output high forces; smooth clipping is better than hard cutoff.
; ==============================================================================
force_clipping_mode = 0.9

; ==============================================================================
; CENTER DEADZONE
; ==============================================================================
; Dead zone around steering center in degrees.
; T300RS GT is precise; use 0 for maximum detail.
;   0.00 = No deadzone (all forces felt)
;   0.05 = Tiny deadzone (1° around center)
;   0.10 = Small deadzone (2° around center)
;
; Recommended: 0.0 (T300RS GT doesn't need deadzone)
; ==============================================================================
center_deadzone = 0.0

; ==============================================================================
; FINAL NOTES - CRITICAL FOR T300RS GT FFB SUCCESS
; ==============================================================================
;
; THIS PROFILE IS TUNED FOR:
;   1. AC Gain = 80 (belt-drive needs higher base gain)
;   2. CSP Gyro = ON (Gain 100-120) - handles centering
;   3. CSP Damper = 10 (belt motor damping)
;   4. CSP Inertia = ON (Gain 15) - makes steering feel weighty
;   5. CSP Filter = 0 (let this config handle it)
;
; IF FFB FEELS WEAK:
;   - Check AC Gain = 80 (should be HIGHER than default 65)
;   - Increase CSP Gyro Gain to 120-140
;   - Verify Road Effects = 1 in AC settings
;   - Increase damping_compensation to 1.6
;
; IF FFB FEELS NOISY/OSCILLATING:
;   - Increase oscillation_damping to 0.35-0.4
;   - Reduce CSP Damper Gain to 5-7
;   - Increase force_clipping_mode to 0.95
;
; IF STEERING FEELS MUSHY AT LOW SPEED:
;   - Increase speed_fuzz_scale to 1.3-1.4
;   - Lower speed_fuzz_boundary to 20 km/h
;   - Increase damping_compensation to 1.5
;
; IF CENTER FEELS LOOSE/UNCONTROLLED:
;   - Enable CSP Gyro = ON in CSP settings
;   - Set Gyro Gain = 110-120
;   - Enable Soft Lock in AC settings
;   - Verify Soft Lock strength in AC settings
;
; IMPORTANT ASSETTO CORSA SETTINGS (non-negotiable):
;   Soft Lock = ON (required for 900° wheel)
;   Brake Lock = ON (realistic)
;   Steering Linearity = 1.0 (don't curve it)
;   Steering Sensitivity = 1.0 (standard)
;   Steering Deadzone = 0.0 (T300RS GT is precise)
;
; ==============================================================================
