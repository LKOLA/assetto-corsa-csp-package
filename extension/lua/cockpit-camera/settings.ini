[NeckFX]
; Cockpit camera (driver head) movement sensitivity and behavior

; Longitudinal movement lag during acceleration/braking
; Range: 0.0 (instant) to 1.0 (very sluggish)
; Recommended: 0.85 (realistic inertial lag)
longitudinal_lag = 0.85

; Braking response multiplier
; Range: 0.5 to 2.0
; Recommended: 1.2 (head moves forward distinctly under braking)
braking_response = 1.2

; Resistance to lateral head movement during cornering
; Range: 0.0 (loose) to 1.0 (stiff)
; Recommended: 0.75 (natural lag with smooth tracking)
lateral_stiffness = 0.75

; Vertical (suspension bump) sensitivity
; Range: 0.0 (no response) to 2.0 (exaggerated)
; Recommended: 1.0 (natural bump compression)
vertical_sensitivity = 1.0

; Camera movement smoothing/interpolation
; Range: 0.0 (very responsive) to 0.25 (sluggish)
; Lower values = snappier response, higher = smoother
; Recommended: 0.12 (smooth but responsive)
smoothing = 0.12

; Natural direction-leading bias (look-ahead)
; Range: 0.0 (no bias) to 0.3 (strong leading)
; Recommended: 0.15 (subtle head turn into corners)
look_ahead_bias = 0.15

; G-force response scaling
; Multiplier for longitudinal G sensitivity
; Range: 0.5 to 2.0
; Recommended: 1.0 (realistic)
longitudinal_g_scale = 1.0

; G-force response scaling
; Multiplier for lateral G sensitivity
; Range: 0.5 to 2.0
; Recommended: 1.0 (realistic)
lateral_g_scale = 1.0

; Maximum vertical head displacement (meters)
; Range: 0.05 to 0.3
; Recommended: 0.12 (realistic human head travel)
max_vertical_displacement = 0.12

; Enable/disable head movement
; 0 = disabled (fixed camera)
; 1 = enabled (dynamic NeckFX)
enabled = 1
