[FFB]
; ==============================================================================
; TIRE GRIP AND SLIP DETECTION
; ==============================================================================
; Controls how sensitively the wheel responds to tire loading changes

; Front tire grip responsiveness (0.5-2.0)
; Higher = more sensitive to front tire changes
front_grip_sensitivity = 1.2

; Rear tire grip responsiveness (0.5-2.0)
; Higher = more sensitive to rear tire changes
rear_grip_sensitivity = 1.0

; Slip angle detection threshold (0-0.5 radians)
; How much slip before effect is noticeable
slip_threshold = 0.08

; ==============================================================================
; WEIGHT TRANSFER
; ==============================================================================
; How much the steering changes based on weight transfer

; Longitudinal weight transfer (braking/accel) gain
; Range: 0.5-2.0 (how much steering changes during accel/braking)
longitudinal_transfer_gain = 1.3

; Lateral weight transfer (cornering) gain
; Range: 0.5-2.0 (how much steering changes during turns)
lateral_transfer_gain = 1.1

; ==============================================================================
; UNDERSTEER AND OVERSTEER BEHAVIOR
; ==============================================================================

; Understeer force reduction (0-1)
; As front grip decreases, steering gets lighter
; 0 = no reduction, 1 = full reduction
understeer_damping = 0.7

; Oversteer detection gain (0.5-2.0)
; How much rear slip angle affects steering
oversteer_gain = 1.4

; Oversteer ramp speed (lower = faster detection)
; Range: 0.01-0.1 (lower values detect slip quicker)
oversteer_ramp_speed = 0.04

; ==============================================================================
; SUSPENSION AND KERB FEEDBACK
; ==============================================================================

; Suspension movement sensitivity (0.5-2.0)
; How much suspension travel is felt in the wheel
suspension_sensitivity = 1.0

; Kerb strike intensity (0.5-2.0)
; How much kerbs are felt (based on suspension compression)
kerb_intensity = 1.1

; Kerb sharpness (0.01-0.2)
; Higher = more pronounced kerb hits (risk of noise)
kerb_sharpness = 0.12

; ==============================================================================
; ROAD TEXTURE AND DETAIL
; ==============================================================================

; Road texture intensity (0-1)
; Subtle feedback from tire-road interaction
road_texture_gain = 0.3

; Road texture frequency filtering (0.1-1.0)
; Lower = only low-frequency bumps, higher = more detail
road_texture_frequency = 0.6

; ==============================================================================
; T300RS GT BELT-DRIVE COMPENSATION
; ==============================================================================

; Center force boost (0-1)
; Belt drives feel soft at center - compensate with light force
center_force_boost = 0.15

; High-frequency detail restoration (0-1)
; Belt drives lose high-freq detail - restore it
highfreq_restoration = 0.2

; Linearity correction (0.8-1.2)
; Belt drive non-linearity compensation
linearity_correction = 0.95

; ==============================================================================
; DAMPING AND SMOOTHING
; ==============================================================================

; Overall damping level (target 10%)
; Range: 0.05-0.2
; Higher = smoother but less responsive
damping_level = 0.12

; Force smoothing factor (0.01-0.1)
; How much to smooth FFB forces (prevents jitter)
smoothing_factor = 0.08

; Spring back rate (0.1-1.0)
; How quickly wheel returns to center after release
spring_back_rate = 0.5

; ==============================================================================
; CLIPPING AND SATURATION
; ==============================================================================

; Clipping prevention threshold (0.8-1.0)
; Reduce forces before reaching wheel maximum
clipping_threshold = 0.88

; Soft clipping curve (0-1)
; How gradual the clipping is (0=hard, 1=very soft)
soft_clipping = 0.9

; ==============================================================================
; GYRO INTEGRATION
; ==============================================================================

; Expected CSP Gyro Gain setting
; Script assumes: Gyro = ON, Gain = 100
; Set this if you use different gyro gain
gyro_gain_expectation = 100

; Gyro interaction damping
; How much gyro affects overall FFB feel
gyro_interaction = 0.3

; ==============================================================================
; GENERAL TUNING
; ==============================================================================

; Master FFB gain multiplier (0.5-2.0)
; Overall strength of all effects
master_gain = 1.0

; Enable/disable script
; 0 = disabled (use post-processing only)
; 1 = enabled (this script active)
enabled = 1

; Debug output (0=off, 1=on)
; Shows real-time values (may impact performance)
debug_mode = 0
