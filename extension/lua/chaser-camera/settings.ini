[Insta360]
; Rear-mounted Insta360-style chaser camera configuration

; Camera distance behind car (meters)
; Range: 2.0 to 8.0
; Recommended: 4.2 (sweet spot for rear bumper + roof visibility)
distance = 4.2

; Camera height above ground (meters)
; Range: 0.5 to 3.0
; Recommended: 1.95 (window-top mounted perspective)
height = 1.95

; Base field of view (degrees)
; Range: 80 to 120
; Recommended: 108 (Insta360 wide-angle)
base_fov = 108

; Speed threshold for FOV increase (km/h)
; Range: 100 to 200
; Recommended: 150 (applies at highway speeds)
speed_fov_threshold = 150

; High-speed field of view (degrees)
; Applied when speed > speed_fov_threshold
; Range: 100 to 130
; Recommended: 112 (slight zoom effect at speed)
high_speed_fov = 112

; Yaw (left-right) tracking smoothing
; Range: 0.05 (snappy) to 0.3 (sluggish)
; Recommended: 0.18 (cinematic smooth tracking)
yaw_smoothing = 0.18

; Pitch (up-down) tracking smoothing
; Range: 0.05 to 0.3
; Recommended: 0.22 (slightly more sluggish than yaw for natural feel)
pitch_smoothing = 0.22

; Roll damping (horizon lock strength)
; Range: 0.3 (weak lock) to 1.0 (strong lock)
; Recommended: 0.85 (very stable horizon, slight camera tilt on cornering)
roll_damping = 0.85

; Direction-leading bias (look-ahead)
; Range: 0.0 to 0.2
; Recommended: 0.08 (subtle forward bias, natural cinematic feel)
look_ahead = 0.08

; Camera rotation inertia (gimbal lag)
; Range: 0.0 (instant) to 0.3 (very laggy)
; Recommended: 0.12 (subtle rotational lag, realistic gimbal feel)
rotation_inertia = 0.12

; Lateral offset from car center (meters)
; Range: -0.5 to 0.5
; Recommended: 0.0 (centered behind car)
lateral_offset = 0.0

; Enable/disable camera
; 0 = disabled
; 1 = enabled
enabled = 1
