[HEADER]\nCALIBRATION_VERSION=2\nTYPE=STEERING\nBRAND=Thrustmaster\nDEVICE=T300RS GT\nDESCRIPTION=T300RS GT (900° Rotation) - Ultra Realistic Setup\n\n[SETTINGS]\n; ==============================================================================\n; Thrustmaster T300RS GT Steering Preset\n; ==============================================================================\n; Optimized for 900° rotation with realistic linearity\n; Compatible with CSP 0.3.0-preview342+\n; Tuned for GTX 1660 Super + 144 Hz display\n; ==============================================================================\n\n; ==============================================================================\n; STEERING LOCK (CRITICAL FOR 900° WHEEL)\n; ==============================================================================\n; The T300RS GT has a hard limit at 900° rotation.\n; This must match your wheel's physical range.\nSTEERING_LOCK=900\n\n; ==============================================================================\n; LINEARITY AND SENSITIVITY\n; ==============================================================================\n; For realistic feel, keep steering PERFECTLY LINEAR (1.0)\n; Any curve (>1.0 or <1.0) creates artificial assists.\nSTEERING_LINEARITY=1.0\nSTEERING_SENSITIVITY=1.0\nSTEERING_DEADZONE=0.0\n\n; ==============================================================================\n; FORCE FEEDBACK SETTINGS (AC Native)\n; ==============================================================================\n; These work with the ff_post_process.ini configuration.\n\n; Master FFB gain (0-200, default 65)\n; T300RS GT belt drives need HIGHER gain for detail.\n; CRITICAL: Set to 80 for this profile to work correctly\nFFB_GAIN=80\n\n; FFB filter strength (0-3)\n;   0 = No filtering (raw, responsive) [CORRECT FOR T300RS GT]\n;   1 = Light smoothing\n;   2 = Medium smoothing\n;   3 = Heavy smoothing\nFFB_FILTER=0\n\n; Minimum force to apply (0-1, typically 0)\nFFB_MIN_FORCE=0\n\n; ==============================================================================\n; EFFECTS INTENSITY\n; ==============================================================================\n; These control how much of each effect the wheel feels.\n; Higher values = more feedback\n\n; Kerb strike feedback (0-3)\n; T300RS GT needs HIGH kerb feedback for detail\nKERB_EFFECT=3\n\n; Road texture feedback (0-1)\n; Important for tire grip feedback\nROAD_EFFECT=1\n\n; Tire slip feedback (0-1)\n; Essential for feeling tire breakaway\nSLIP_EFFECT=1\n\n; ABS pulse feedback (0-1)\n; Realistic ABS chatter feedback\nABS_EFFECT=1\n\n; ==============================================================================\n; STEERING CHARACTERISTICS\n; ==============================================================================\n; Realistic steering response without artificial boosts\n\n; Soft steering lock (limits FFB at lock)\n; Prevents harsh centering at extreme angles\nSOFT_LOCK=ON\n\n; Enhanced understeer feedback\n; OFF = realistic (no artificial centering boost)\nENHANCED_UNDERSTEER=OFF\n\n; Brake lock feedback\n; Realistic: ON (wheel locks when brakes lock)\nBRAKE_LOCK=ON\n\n; ==============================================================================\n; T300RS GT SPECIFIC TUNING\n; ==============================================================================\n; These settings compensate for belt-drive characteristics\n\n; Damping (internal wheel friction simulation)\n; T300RS GT: minimal internal damping, use default\nDAMPING=10\n\n; Friction (steering centering resistance)\n; Belt drives: natural centering, no extra friction needed\nFRICTION=0\n\n; ==============================================================================\n; STEERING REACTION TUNING\n; ==============================================================================\n; How quickly the wheel responds to game inputs\n\n; Speed sensitivity (adjusts FFB based on car speed)\n; ON = more feedback at speed (realistic)\nSPEED_SENSITIVITY=ON\n\n; Inertia effect (steering wheel feels weighted)\n; Important for T300RS GT belt drives\nINERTIA_EFFECT=1.5\n\n; Gyro compensation (artificial centering)\n; Leave at default (CSP handles this better)\nGYRO_COMPENSATION=0\n\n; ==============================================================================\n; AC PROFILE SETTINGS (AUTO-APPLIED)\n; ==============================================================================\n; These control Assetto Corsa's FFB behavior\n\n; FFB saturation protection\nFFB_CLIPPING=0.9\n\n; FFB quality (lag reduction)\nFFB_QUALITY=HIGH\n\n; Force update rate (Hz)\n; T300RS GT: 1000 Hz native\nFFB_UPDATE_RATE=1000\n\n; ==============================================================================\n; CALIBRATION SETTINGS\n; ==============================================================================\n; Leave these as-is. Calibrate in Windows device settings if needed.\n\nCALIBRATION_X=0\nCALIBRATION_Y=0\nCALIBRATION_Z=0\nCALIBRATION_RX=0\nCALIBRATION_RY=0\nCALIBRATION_RZ=0\n\n; ==============================================================================\n; NOTES FOR CONTENT MANAGER\n; ==============================================================================\n;\n; This preset is designed for REALISTIC simulation on T300RS GT.\n; \n; Expected feel:\n;   - Sharp, responsive steering\n;   - Clear tire feedback and road texture\n;   - Strong kerb strike detail\n;   - Natural weight and inertia\n;   - No artificial assists or boosts\n;\n; Pair with:\n;   - ff_post_process.ini (system/cfg/)\n;   - CSP Gyro = ON (Gain 100-120)\n;   - CSP Damper Gain = 10\n;   - CSP Inertia = ON (Gain 15)\n;\n; If steering feels wrong:\n;   1. Verify FFB_GAIN=80 (not 65)\n;   2. Check AC \"Soft Lock\" = ON\n;   3. Confirm wheel is 900° in Windows\n;   4. Test on familiar track\n;\n; ==============================================================================\n"